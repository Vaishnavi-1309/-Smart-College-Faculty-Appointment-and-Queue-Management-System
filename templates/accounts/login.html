{% extends 'base.html' %}
{% block title %}Login — Campus Queue System{% endblock %}
{% block content %}

<div class="login-card">
    <div class="login-logo">
        <h1>🎓 Campus Queue</h1>
        <p>Smart Faculty Appointment System</p>
    </div>

    <form method="POST">
        {% csrf_token %}
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter your username" required autofocus>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required>

        <button type="submit" class="btn btn-primary" style="width:100%; padding:13px; font-size:15px; margin-top:4px;">
            Login →
        </button>
    </form>
</div>

{% endblock %}
