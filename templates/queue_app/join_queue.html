{% extends 'base.html' %}
{% block title %}Join Queue{% endblock %}
{% block content %}

<h2 style="margin-bottom:20px">Join Queue</h2>

<div class="card">
    <form method="POST">
        {% csrf_token %}

        <label>Select Faculty</label>
        <select name="faculty_id" id="faculty_select" required onchange="showSchedule()">
            <option value="">-- Select Faculty --</option>
            {% for faculty in faculties %}
            <option value="{{ faculty.id }}"
                data-open="{{ faculty.is_within_working_hours }}"
                data-today="{% with s=faculty.todays_schedule %}{% if s %}{{ s.start_time }} - {{ s.end_time }}{% else %}Closed today{% endif %}{% endwith %}"
                {% if selected_faculty and selected_faculty.id == faculty.id %}selected{% endif %}>
                {{ faculty.name }} — {{ faculty.department }}
                ({{ faculty.get_status_display }})
            </option>
            {% endfor %}
        </select>

        <div id="schedule-info" style="display:none; margin-bottom:16px;"></div>

        <label>Request Type</label>
        <select name="request_type" required>
            <option value="">-- Select Type --</option>
            <option value="signature">Signature</option>
            <option value="assignment">Assignment Submission</option>
            <option value="doubt">Doubt Solving</option>
            <option value="project">Project Discussion</option>
        </select>

        <button type="submit" class="btn btn-primary" style="width:100%; padding:12px;">
            🎫 Get Token & Join Queue
        </button>
    </form>
</div>

<a href="{% url 'student_dashboard' %}" class="btn btn-danger" style="margin-top:10px;">
    ← Back to Dashboard
</a>

<script>
function showSchedule() {
    const select = document.getElementById('faculty_select');
    const selected = select.options[select.selectedIndex];
    const infoBox = document.getElementById('schedule-info');

    if (!selected.value) {
        infoBox.style.display = 'none';
        return;
    }

    const isOpen = selected.getAttribute('data-open') === 'True';
    const todaySchedule = selected.getAttribute('data-today');

    infoBox.style.display = 'block';
    if (isOpen) {
        infoBox.innerHTML = `<div class="msg msg-success">✅ Open now — Today's hours: ${todaySchedule}</div>`;
    } else {
        infoBox.innerHTML = `<div class="msg msg-warning">⚠️ Closed right now — Today's hours: ${todaySchedule}</div>`;
    }
}

window.onload = showSchedule;
</script>

{% endblock %}
